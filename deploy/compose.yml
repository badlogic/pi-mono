services:
  mom:
    build:
      context: "docker/mom"
      dockerfile: Dockerfile
    image: pi-mom:local
    container_name: mom
    restart: unless-stopped
    volumes:
      - ${MOM_BASE}/repo:/repo
      - ${MOM_BASE}/data:/data
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      REPO_URL: ${REPO_URL}
      REPO_BRANCH: ${REPO_BRANCH:-main}
      CHECK_INTERVAL_SECONDS: ${CHECK_INTERVAL_SECONDS:-120}
      STARTUP_GRACE_SECONDS: ${STARTUP_GRACE_SECONDS:-25}
      MOM_BASE: ${MOM_BASE}
      MOM_DATA_DIR: /data
    stdin_open: true
    tty: true

  updater:
    build:
      context: "docker/updater"
      dockerfile: Dockerfile
    image: mom-updater:local
    container_name: mom-updater
    restart: unless-stopped
    volumes:
      - ${MOM_BASE}/repo:/work/repo
      - ${MOM_BASE}/state:/work/state
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      REPO_URL: ${REPO_URL}
      REPO_BRANCH: ${REPO_BRANCH:-main}
      CHECK_INTERVAL_SECONDS: ${CHECK_INTERVAL_SECONDS:-120}
      STARTUP_GRACE_SECONDS: ${STARTUP_GRACE_SECONDS:-25}
      MOM_BASE: ${MOM_BASE}
    stdin_open: true
    tty: true
