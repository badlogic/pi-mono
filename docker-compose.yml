services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    image: fugue-postgres:local
    environment:
      POSTGRES_USER: fugue
      POSTGRES_PASSWORD: fugue
      POSTGRES_DB: fugue
    ports:
      - "5432:5432"
    volumes:
      - fugue_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fugue -d fugue"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  fugue-core:
    build:
      context: .
      dockerfile: packages/fugue-core/Dockerfile
    image: fugue-core:local
    environment:
      DATABASE_URL: postgresql://fugue:fugue@postgres:5432/fugue
      PORT: 3001
      TRUSTED_ORIGINS: http://localhost:3000
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  fugue-sync:
    build:
      context: .
      dockerfile: packages/fugue-sync/Dockerfile
    image: fugue-sync:local
    environment:
      DATABASE_URL: postgresql://fugue:fugue@postgres:5432/fugue
      SYNC_PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  fugue-connectors:
    build:
      context: .
      dockerfile: packages/fugue-connectors/Dockerfile
    image: fugue-connectors:local
    environment:
      CONNECTOR_PORT: 4002
      FUGUE_CORE_URL: http://fugue-core:3001
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET:-}"
    ports:
      - "4002:4002"
    depends_on:
      fugue-core:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:4002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  fugue-surface:
    build:
      context: .
      dockerfile: packages/fugue-surface/Dockerfile
    image: fugue-surface:local
    ports:
      - "3000:3000"
    depends_on:
      - fugue-core
      - fugue-sync
    restart: unless-stopped

volumes:
  fugue_pgdata:
